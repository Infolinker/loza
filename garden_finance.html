<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Финансы СТ - Лоза</title>
    <style>
        body { background-color: #f0f4f8; font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; font-size: 16px; line-height: 1.4; }
        header { background-color: #004d40; color: white; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 15px; }
        .back-btn { display: inline-block; margin-bottom: 10px; color: #004d40; text-decoration: none; font-weight: bold; border: 1px solid #004d40; padding: 8px 12px; border-radius: 8px; }
        
        /* Кнопки переключения (Табы) */
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { background: white; border: 1px solid #004d40; color: #004d40; padding: 10px; border-radius: 8px; font-size: 0.85em; font-weight: bold; white-space: nowrap; cursor: pointer; flex: 1; text-align: center; }
        .tab-btn.active { background: #004d40; color: white; }

        .content-section { display: none; }
        .content-section.active { display: block; }

        /* Карточки и строки */
        .report-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; border-top: 4px solid #004d40; }
        .table-title { font-weight: bold; margin: 20px 0 10px; color: #004d40; border-bottom: 2px solid #004d40; font-size: 0.9em; }
        .fin-row { background: white; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 0.9em; border: 1px solid #eee; border-left: 5px solid #388e3c; }
        .urgent { border-left-color: #d32f2f; background: #fff8f8; }
        
        .info-box { background: #e3f2fd; padding: 10px; border-radius: 8px; font-size: 0.8em; border-left: 4px solid #1976d2; margin-top: 10px; }
        .sum-val { font-weight: bold; white-space: nowrap; }
    </style>
</head>
<body>

    <a href="garden.html" class="back-btn">← Меню СТ</a>

    <header>
        <h1>📊 Касса СТ "Енергія-2011"</h1>
    </header>

    <div class="tabs">
        <div class="tab-btn active" onclick="showTab('bills')">Официальные счета</div>
        <div class="tab-btn" onclick="showTab('repair')">Ремонт</div>
        <div class="tab-btn" onclick="showTab('fees')">Взносы</div>
    </div>

    <div id="bills" class="content-section active">
        <div class="report-card">
            <div style="text-align: center; color: #666; font-size: 0.85em;">Текущий счет за Март:</div>
            <div style="text-align: center; font-size: 1.8em; font-weight: bold; color: #d32f2f;">27 781,92 ₴</div>
            <div style="text-align: center; font-size: 0.75em; color: #888; margin-top: 5px;">Оплата до 13.04.2026</div>
        </div>

        <div class="table-title">📅 График платежей 2026</div>
