<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Финансы</title>
    <style>
        body { background-color: #f4f7f4; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto; }
        .btn { background: #1976d2; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; display: inline-block; margin-top: 10px; font-weight: bold; }
        #preview { max-width: 100%; margin-top: 20px; display: none; border: 2px solid #ccc; }
        .back { display: block; margin-bottom: 20px; color: #1976d2; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <a href="garden.html" class="back">← Назад в меню</a>
    <h1>💰 ФИНАНСОВАЯ ОТЧЕТНОСТЬ</h1>
    <div class="card">
        <p>Выберите фото чека для просмотра:</p>
        <label class="btn">
            📂 ОТКРЫТЬ ЧЕК
            <input type="file" style="display:none" accept="image/*" onchange="loadFile(event)">
        </label>
        <img id="preview">
        <p style="font-size: 0.8em; color: #666; margin-top: 10px;">(Администрация)</p>
    </div>

    <script>
      var loadFile = function(event) {
        var output = document.getElementById('preview');
        output.src = URL.createObjectURL(event.target.files[0]);
        output.style.display = 'block';
      };
    </script>
</body>
</html>
